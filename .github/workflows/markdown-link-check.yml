name: Monthly Markdown Link Check

on:
  # Runs at midnight on the first of every month
  schedule:
    - cron: "0 0 1 * *"

jobs:
  markdown_link_check:
    name: Markdown Link Check
    uses: Anonymous/.github/.github/workflows/markdown-link-check.yml@v2
    permissions:
      contents: read
